name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Import check
        run: python -c "import main, cli, core, llm, tool, agent, models, wire, service, ui, hooks"
      - name: Run tests
        # `python -m` puts the repo root on sys.path so these imports resolve.
        # The suite covers the offline guards; nothing here calls the API.
        run: python -m pytest tests/ -v
