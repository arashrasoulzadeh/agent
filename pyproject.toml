[project]
name = "agent"
version = "0.1.0"
description = "An interactive CLI agent that reads a codebase and answers questions about it."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "langchain",
    "langchain-openai",
    "python-dotenv",
    "rich",
    "textual",
    "websockets",
]

[tool.ruff]
line-length = 88
target-version = "py311"
exclude = [".venv", "__pycache__"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle
    "F",   # pyflakes
    "I",   # import sorting
    "UP",  # pyupgrade
    "B",   # bugbear
]
